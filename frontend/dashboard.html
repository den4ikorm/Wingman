<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Мой день</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.1rem; font-weight: 600; }
        .vibe-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #2a2a2a;
        }

        .content {
            padding: 16px 20px;
        }

        /* Секции от Gemini */
        section {
            background: #1e1e1e;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            border-left: 4px solid #4CAF50;
            display: none;
        }
        section.active { display: block; }
        section h2 { color: #4CAF50; font-size: 1rem; margin-bottom: 10px; }
        section ul { padding-left: 18px; }
        section li { margin-bottom: 8px; line-height: 1.5; }

        /* Нижняя навигация */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            height: 60px;
        }

        nav button {
            flex: 1;
            background: none;
            border: none;
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: color 0.2s;
        }

        nav button.active { color: #4CAF50; }
        nav button span { font-size: 1.3rem; }

        .loader {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .vibe-spark  { border-left-color: #FF6B35; }
        .vibe-spark h2 { color: #FF6B35; }
        .vibe-twilight { border-left-color: #7C6AF5; }
        .vibe-twilight h2 { color: #7C6AF5; }
    </style>
</head>
<body>

<header>
    <h1>Мой день ✦</h1>
    <div class="vibe-badge" id="vibe-label">...</div>
</header>

<div class="content" id="content">
    <div class="loader">Загружаю план...</div>
</div>

<nav>
    <button class="active" onclick="show(1, this)">
        <span>📅</span>ПЛАН
    </button>
    <button onclick="show(2, this)">
        <span>🛒</span>МАРКЕТ
    </button>
    <button onclick="show(3, this)">
        <span>🛁</span>РЕЛАКС
    </button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('#121212');
tg.setBackgroundColor('#121212');

// Берём user_id из URL или из Telegram
const pathParts = window.location.pathname.split('/');
const userId = pathParts[pathParts.length - 1] || tg.initDataUnsafe?.user?.id;

const API = ''; // пусто = тот же домен

let currentTab = 1;

async function loadPlan() {
    try {
        const res = await fetch(`${API}/api/plan/${userId}`);
        if (!res.ok) throw new Error('No plan');
        const data = await res.json();

        // Отображаем вайб
        const vibeLabels = { spark: '⚡ Spark', observer: '🌿 Observer', twilight: '🌙 Twilight' };
        document.getElementById('vibe-label').textContent = vibeLabels[data.vibe] || data.vibe;

        // Вставляем HTML от Gemini и применяем vibe-класс
        document.getElementById('content').innerHTML = data.html || '<p>План ещё не готов</p>';

        // Активируем вайб-стиль
        document.querySelectorAll('section').forEach(s => {
            s.classList.add(`vibe-${data.vibe}`);
        });

        show(1);

    } catch (e) {
        document.getElementById('content').innerHTML =
            '<div class="loader">План ещё не готов.<br>Дождись утреннего сообщения 🌅</div>';
    }
}

function show(tab, btn) {
    currentTab = tab;

    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

    const section = document.getElementById(`tab${tab}`);
    if (section) section.classList.add('active');
    if (btn) btn.classList.add('active');
    else document.querySelectorAll('nav button')[tab - 1]?.classList.add('active');
}

loadPlan();
</script>

</body>
</html>
